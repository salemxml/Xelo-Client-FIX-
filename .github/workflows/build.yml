name: Build Debug APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  debug-build:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: r27c
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Clone submodules manually
        run: |
          CPP_DIR=app/src/main/cpp

          if [ ! -d "$CPP_DIR/Preloader/.git" ] && [ ! -f "$CPP_DIR/Preloader/.git" ]; then
            echo "Cloning Preloader..."
            rm -rf "$CPP_DIR/Preloader"
            git clone --depth=1 https://github.com/Viablecobra/Preloader.git "$CPP_DIR/Preloader"
          else
            echo "Preloader already present."
          fi

          if [ ! -d "$CPP_DIR/libHttpClient/.git" ] && [ ! -f "$CPP_DIR/libHttpClient/.git" ]; then
            echo "Cloning libHttpClient..."
            rm -rf "$CPP_DIR/libHttpClient"
            git clone --recurse-submodules --depth=1 https://github.com/microsoft/libHttpClient.git "$CPP_DIR/libHttpClient"
          else
            echo "libHttpClient already present."
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27c
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018" || true
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | sort -V | tail -1)
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: XeloClient-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error
