name: Build Release APK

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.7)'
        required: false
        default: ''
      create_release:
        description: 'Create GitHub Release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest

    env:
      ANDROID_NDK_VERSION: r27c
      JAVA_HOME: /usr/lib/jvm/java-21-openjdk-amd64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: false

      - name: Clone submodules manually
        run: |
          CPP_DIR=app/src/main/cpp

          if [ ! -d "$CPP_DIR/Preloader/.git" ] && [ ! -f "$CPP_DIR/Preloader/.git" ]; then
            echo "Cloning Preloader..."
            rm -rf "$CPP_DIR/Preloader"
            git clone --depth=1 https://github.com/Viablecobra/Preloader.git "$CPP_DIR/Preloader"
          else
            echo "Preloader already present."
          fi

          if [ ! -d "$CPP_DIR/libHttpClient/.git" ] && [ ! -f "$CPP_DIR/libHttpClient/.git" ]; then
            echo "Cloning libHttpClient..."
            rm -rf "$CPP_DIR/libHttpClient"
            git clone --recurse-submodules --depth=1 https://github.com/microsoft/libHttpClient.git "$CPP_DIR/libHttpClient"
          else
            echo "libHttpClient already present."
          fi

      - name: Verify submodules
        run: |
          echo "=== Preloader ==="
          ls app/src/main/cpp/Preloader || echo "ERROR: Preloader missing"
          echo "=== libHttpClient ==="
          ls app/src/main/cpp/libHttpClient || echo "ERROR: libHttpClient missing"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK r27c
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.2.12479018" || \
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk-bundle" || true
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d | sort -V | tail -1)
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK found at: $NDK_PATH"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Set version name
        if: inputs.version_name != ''
        run: |
          sed -i "s/versionName \".*\"/versionName \"${{ inputs.version_name }}\"/" app/build.gradle

      - name: Setup signing (if secrets exist)
        id: signing
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/keystore.jks
            echo "SIGNING_AVAILABLE=true" >> $GITHUB_ENV
            echo "signing_available=true" >> $GITHUB_OUTPUT
          else
            echo "SIGNING_AVAILABLE=false" >> $GITHUB_ENV
            echo "signing_available=false" >> $GITHUB_OUTPUT
            echo "No signing secrets found — will build unsigned APK"
          fi

      - name: Build Release APK (signed)
        if: steps.signing.outputs.signing_available == 'true'
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=$GITHUB_WORKSPACE/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }} \
            --stacktrace

      - name: Build Release APK (unsigned)
        if: steps.signing.outputs.signing_available != 'true'
        run: ./gradlew assembleRelease --stacktrace

      - name: Rename APK
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          if [ -n "$APK" ]; then
            VER=$(grep versionName app/build.gradle | head -1 | grep -oP '"\K[^"]+')
            DEST="app/build/outputs/apk/release/XeloClient-v${VER}-release.apk"
            mv "$APK" "$DEST" 2>/dev/null || true
            echo "APK_PATH=$DEST" >> $GITHUB_ENV
          fi

      - name: Show APK info
        run: |
          echo "=== Release APK ==="
          find app/build/outputs/apk/release -name "*.apk" -exec ls -lh {} \;

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: XeloClient-release-${{ github.run_number }}
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
          if-no-files-found: error

      - name: Get version for release tag
        id: get_version
        run: |
          VER=$(grep versionName app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: inputs.create_release == true || startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.get_version.outputs.version) }}
          name: "Xelo Client v${{ steps.get_version.outputs.version }}"
          files: app/build/outputs/apk/release/*.apk
          body: |
            ## Xelo Client v${{ steps.get_version.outputs.version }}

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Install
            1. Download the APK below
            2. Enable **Unknown Sources** in Android settings
            3. Install the APK
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
